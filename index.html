<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서론 | 제주 게스트하우스</title>
    <link rel="icon" href="사진/logo.jpg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

            apiKey: "AIzaSyCDEKWXCOgRC9C_RNX_h8XhmWiMXIAtJkM",
            authDomain: "seolon-66bd0.firebaseapp.com",
            databaseURL: "https://seolon-66bd0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seolon-66bd0",
            storageBucket: "seolon-66bd0.firebasestorage.app",
            messagingSenderId: "626593879677",
            appId: "1:626593879677:web:c778c6189948b6486e8314",
            measurementId: "G-Y6KY7NQN01"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="logo"><img src="사진/logo.jpg" alt="서론" class="logo-img"><span class="logo-text">서론</span></a>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-links">홈</a></li>
                <li><a href="#reservation" class="nav-links">예약현황</a></li>
                <li><a href="#events" class="nav-links">오늘의LP</a></li>
                <li><a href="#guide" class="nav-links">안내사항</a></li>
                <li><a href="#community" class="nav-links">게시판</a></li>
                <li><button class="admin-login-btn" id="btn-admin-login">Admin</button></li>
                <li><button class="admin-login-btn" id="btn-admin-logout" style="display:none;">Logout</button></li>
            </ul>
        </div>
    </nav>

    <main>
        <section id="home" class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title">서론</h1>
                <p class="hero-subtitle">여행의 첫문장. '서론' 게스트하우스</p>
                <a href="#reservation" class="btn-primary">예약하기</a>
            </div>
        </section>

        <section id="reservation" class="section-padding bg-light">
            <div class="container">
                <h2 class="section-title">Reservation</h2>
                <div class="reservation-wrapper">
                    <div class="calendar-section">
                        <div class="calendar-header">
                            <button id="prev-month" class="cal-nav">&lt;</button>
                            <span class="month-selector" id="current-month-display"></span>
                            <button id="next-month" class="cal-nav">&gt;</button>
                        </div>
                        <div class="calendar-grid" id="calendar-body"></div>
                    </div>
                    <div class="room-status-panel">
                        <h3 id="selected-date-display" style="text-align: center;">날짜를 선택해주세요</h3>
                        <div id="room-status-container" style="display:none;">
                            <div class="status-box" id="box-room3">
                                <div class="box-header"><h4>3인 프라이빗 룸</h4><span class="gender-label" id="label-room3"></span></div>
                                <p>인원: <span id="capa-room3">0</span>/3</p>
                                <div class="admin-editable"><select id="admin-select-room3"><option value="none">미정</option><option value="female">여성</option><option value="male">남성</option></select><input type="number" id="admin-capa-room3" min="0" max="3"><button class="btn-secondary" onclick="saveRoomGender('room3')">저장</button></div>
                            </div>
                            <div class="status-box" id="box-room4">
                                <div class="box-header"><h4>4인 도미토리</h4><span class="gender-label" id="label-room4"></span></div>
                                <p>인원: <span id="capa-room4">0</span>/4</p>
                                <div class="admin-editable"><select id="admin-select-room4"><option value="none">미정</option><option value="female">여성</option><option value="male">남성</option></select><input type="number" id="admin-capa-room4" min="0" max="4"><button class="btn-secondary" onclick="saveRoomGender('room4')">저장</button></div>
                            </div>
                            <div class="status-box" id="box-room6">
                                <div class="box-header"><h4>6인 도미토리</h4><span class="gender-label" id="label-room6"></span></div>
                                <p>인원: <span id="capa-room6">0</span>/6</p>
                                <div class="admin-editable"><select id="admin-select-room6"><option value="none">미정</option><option value="female">여성</option><option value="male">남성</option></select><input type="number" id="admin-capa-room6" min="0" max="6"><button class="btn-secondary" onclick="saveRoomGender('room6')">저장</button></div>
                            </div>
                            <div style="margin-top: 20px; text-align: center;"><a href="https://pf.kakao.com/_xxxx" target="_blank" class="kakao-reserve-btn"> 숙박 예약 문의 </a></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="events" class="section-padding">
            <div class="container">
                <h2 class="section-title">Today's LP</h2>
                <div class="event-container">
                    <div class="event-vinyl"><div class="vinyl-record"></div></div>
                    <div class="event-details">
                        <div class="lp-schedule">
                            <p>아침: <span id="lp-morning-text">-</span></p>
                            <p>저녁: <span id="lp-evening-text">-</span></p>
                            <div class="lp-admin-inputs">
                                <input type="text" id="input-lp-morning" placeholder="아침 LP"><input type="text" id="input-lp-evening" placeholder="저녁 LP"><button class="btn-secondary" onclick="saveLP()">저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="guide" class="section-padding bg-light">
            <div class="container">
                <h2 class="section-title">Guide</h2>
                <div class="info-card"><div id="guide-display-content" style="white-space: pre-wrap;"></div></div>
                <div class="admin-editable" style="margin-top:20px; text-align: center;"><textarea id="admin-guide-textarea" rows="5" style="width:100%; max-width:800px;"></textarea><br><button class="btn-secondary mt-3" onclick="saveGuideParams()">반영</button></div>
            </div>
        </section>

        <section id="community" class="section-padding">
            <div class="container">
                <h2 class="section-title">Community</h2>
                <div class="community-wrapper">
                    <div class="write-form"><input type="text" id="board-author" placeholder="닉네임"><input type="password" id="board-pw" placeholder="비밀번호"><textarea id="board-content" placeholder="건의사항" rows="4"></textarea><button class="btn-primary" onclick="addBoardContent()">등록</button></div>
                    <div id="board-list" class="board-list"></div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="admin-modal"><div class="login-modal"><h2>Admin Login</h2><input type="password" id="admin-pw" placeholder="Password"><button class="btn-primary" onclick="attemptAdminLogin()">로그인</button><button class="btn-secondary" onclick="closeAdminModal()">취소</button></div></div>
    <script src="app.js"></script>
</body>
</html>
